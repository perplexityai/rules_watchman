name: bazel-opt

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and update
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build optimized binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          cache-save: true
          disk-cache: ${{ github.workflow }}-linux-x64
          repository-cache: true

      - name: Build optimized distributions
        run: |
          set -euo pipefail

          targets=(
            //:watchman-x86_64-linux-gnu
            //:watchman-aarch64-linux-gnu
            //:watchman-aarch64-apple-darwin
          )
          bazel build --compilation_mode=opt "${targets[@]}"

          execroot="$(bazel info execution_root)"
          stage() {
            local triple="$1"
            local target="$2"
            local outputs=()

            mapfile -t outputs < <(
              bazel cquery --compilation_mode=opt --output=files "$target"
            )
            [[ "${#outputs[@]}" -eq 1 ]]
            install -Dm755 \
              "$execroot/${outputs[0]}" \
              "artifacts/watchman-$triple"
          }

          stage x86_64-linux-gnu //:watchman-x86_64-linux-gnu
          stage aarch64-linux-gnu //:watchman-aarch64-linux-gnu
          stage aarch64-apple-darwin //:watchman-aarch64-apple-darwin

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-x86_64-linux-gnu-opt
          path: artifacts/watchman-x86_64-linux-gnu
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-aarch64-linux-gnu-opt
          path: artifacts/watchman-aarch64-linux-gnu
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-aarch64-apple-darwin-opt
          path: artifacts/watchman-aarch64-apple-darwin
          if-no-files-found: error

  publish:
    name: Publish release binaries
    needs: build
    if: ${{ github.event_name == 'release' || inputs.tag != '' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: watchman-*-opt
          path: artifacts
          merge-multiple: true

      - name: Upload release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          assets=(
            artifacts/watchman-x86_64-linux-gnu
            artifacts/watchman-aarch64-linux-gnu
            artifacts/watchman-aarch64-apple-darwin
          )
          for asset in "${assets[@]}"; do
            [[ -f "$asset" ]]
          done

          gh release upload \
            "$RELEASE_TAG" \
            "${assets[@]}" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
