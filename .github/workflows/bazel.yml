name: bazel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          disk-cache: ${{ github.workflow }}-linux-x64
          repository-cache: true

      - name: Build distributions
        run: |
          set -euo pipefail

          targets=(
            //:watchman-x86_64-linux-gnu
            //:watchman-aarch64-linux-gnu
            //:watchman-aarch64-apple-darwin
          )
          bazel build "${targets[@]}"

          execroot="$(bazel info execution_root)"
          stage() {
            local triple="$1"
            local target="$2"
            local outputs=()

            mapfile -t outputs < <(bazel cquery --output=files "$target")
            [[ "${#outputs[@]}" -eq 1 ]]
            install -Dm755 \
              "$execroot/${outputs[0]}" \
              "artifacts/$triple/watchman"
          }

          stage x86_64-linux-gnu //:watchman-x86_64-linux-gnu
          stage aarch64-linux-gnu //:watchman-aarch64-linux-gnu
          stage aarch64-apple-darwin //:watchman-aarch64-apple-darwin

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-x86_64-linux-gnu
          path: artifacts/x86_64-linux-gnu/watchman
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-aarch64-linux-gnu
          path: artifacts/aarch64-linux-gnu/watchman
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: watchman-aarch64-apple-darwin
          path: artifacts/aarch64-apple-darwin/watchman
          if-no-files-found: error

  smoke:
    name: Smoke test (${{ matrix.triple }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-linux-gnu
            runner: ubuntu-24.04
          - triple: aarch64-linux-gnu
            runner: ubuntu-24.04-arm
          - triple: aarch64-apple-darwin
            runner: macos-15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: watchman-${{ matrix.triple }}
          path: artifacts

      - name: Run smoke test
        run: |
          binary="$PWD/artifacts/watchman"
          chmod +x "$binary"
          tests/watchman_smoke_test.sh "$binary"
